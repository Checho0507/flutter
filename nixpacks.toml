# 1. Crea nixpacks.toml (opción 4)
cat > nixpacks.toml << 'EOF'
[phases.setup]
nixPkgs = ["nodejs_18", "pnpm-9_x", "openssl"]

[phases.install]
cmds = ["pnpm i --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server build"]

[phases.start]
cmd = "pnpm --filter @workspace/api-server start"
EOF

# 2. Actualiza railway.json
cat > railway.json << 'EOF'
{
  "$schema": "https://railway.app/railway.schema.json",
  "build": {
    "builder": "NIXPACKS"
  }
}
EOF

# 3. Commit y push
git add nixpacks.toml railway.json
git commit -m "fix: use nixpacks.toml for explicit configuration"
git push