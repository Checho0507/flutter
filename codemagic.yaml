workflows:
  flutter-build:
    name: Flutter Build
    environment:
      vars:
        API_URL: "https://tu-api.railway.app"  # Cambia por tu URL de Railway
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      
      - name: Build Android APK
        script: flutter build apk --release --dart-define=API_URL=$API_URL
      
      - name: Build iOS IPA
        script: flutter build ipa --release --dart-define=API_URL=$API_URL
      
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/ios/ipa/*.ipa
    
    publishing:
      email:
        recipients:
          - tu-email@example.com  # Cambia por tu email